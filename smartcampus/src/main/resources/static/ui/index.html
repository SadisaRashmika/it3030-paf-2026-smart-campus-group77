<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartCampus Access Portal</title>
  <link rel="stylesheet" href="/ui/styles.css">
</head>
<body>
  <div class="bg-grid"></div>
  <main class="shell">
    <header class="hero">
      <p class="eyebrow">SmartCampus</p>
      <h1>Activation and Admin Console</h1>
      <p class="subtitle">No browser popup prompts. Log in from this UI and manage activation, roles, and suspicious accounts.</p>
    </header>

    <section class="card" id="auth-card">
      <h2>Sign In</h2>
      <form id="login-form" class="form-grid">
        <label>
          Email
          <input id="login-email" type="email" placeholder="admin@example.edu" required>
        </label>
        <label>
          Password
          <input id="login-password" type="password" placeholder="Enter password" required>
        </label>
        <button type="submit">Login</button>
      </form>
      <div class="message" id="auth-message"></div>
    </section>

    <section class="card hidden" id="activation-card">
      <h2>Account Activation</h2>
      <form id="send-otp-form" class="form-grid compact">
        <label>
          Student/Lecturer ID
          <input id="activation-user-id" type="text" placeholder="STU001 or LEC001" required>
        </label>
        <label>
          Campus Email
          <input id="activation-email" type="email" placeholder="student@example.edu" required>
        </label>
        <button type="submit">Send OTP</button>
      </form>

      <form id="verify-form" class="form-grid compact">
        <label>
          OTP
          <input id="activation-otp" type="text" maxlength="6" placeholder="6-digit OTP" required>
        </label>
        <label>
          New Password
          <input id="activation-password" type="password" placeholder="Create password" required>
        </label>
        <button type="submit">Verify and Activate</button>
      </form>
      <div class="message" id="activation-message"></div>
    </section>

    <section class="card hidden" id="admin-card">
      <div class="admin-header">
        <h2>Admin User Management</h2>
        <button id="refresh-users" type="button">Refresh Users</button>
      </div>
      <div class="message" id="admin-message"></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>User ID</th>
              <th>Email</th>
              <th>Role</th>
              <th>Status</th>
              <th>OTP Requests</th>
              <th>Failed OTP</th>
            </tr>
          </thead>
          <tbody id="users-table"></tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="/ui/app.js"></script>
</body>
</html>
