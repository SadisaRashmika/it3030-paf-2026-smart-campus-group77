spring.application.name=smartcampus
server.port=8081
spring.config.import=optional:file:.env.properties,optional:file:./smartcampus/.env.properties

spring.datasource.url=jdbc:postgresql://localhost:5432/${DB_NAME:smartcampus_db}
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:admin}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false

app.security.admin-email=koffy.doggy@gmail.com
app.security.admin-password=12345
app.security.admin-user-id=ADMIN001
app.activation.otp-ttl-minutes=10
app.activation.max-otp-requests-before-flag=3

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USER:}
spring.mail.password=${EMAIL_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.mail.from=${EMAIL_USER:no-reply@smartcampus.local}
app.mail.enabled=${MAIL_ENABLED:true}

# Frontend base URL (can be overridden with the FRONTEND_BASE_URL environment variable)
app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:5173}

# Google OAuth settings
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8081/login/oauth2/code/google
