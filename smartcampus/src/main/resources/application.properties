spring.application.name=smartcampus

# ── Server ──────────────────────────────────────────────────────────────────
server.port=8081

# ── PostgreSQL ───────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
# validate  – check schema matches entities on startup (recommended for prod)
# update    – auto-alter tables to match entities (handy for development)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.format-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Jackson ──────────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Colombo
