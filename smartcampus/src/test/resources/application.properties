spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
server.port=0

app.security.admin-email=test-admin@smartcampus.local
app.security.admin-password=Admin123!
app.security.admin-user-id=TEST_ADMIN001
app.security.lecturer-password=Lecturer123!
app.security.student-password=Student123!
app.activation.otp-ttl-minutes=10
app.activation.max-otp-requests-before-flag=3

# Disable real mail during tests
app.mail.enabled=false
app.mail.from=no-reply@test.local
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=
spring.mail.password=

# Frontend URL (not used in tests but required by security config)
app.frontend.base-url=http://localhost:5173

# Disable OAuth2 auto-config in tests
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret
spring.security.oauth2.client.registration.google.scope=openid,profile,email